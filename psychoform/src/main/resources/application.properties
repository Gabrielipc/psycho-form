spring.application.name=psychoform
spring.datasource.url=${BFA_DB_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
spring.datasource.username=${BFA_DB_USERNAME:postgres}
spring.datasource.password=${BFA_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
security.jwt.secret=${BFA_JWT_SECRET:un_secreto_temporal_muy_largo_para_desarrollo_local}
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
bfa.storage.supabase.url=${BFA_SUPABASE_URL:}
bfa.storage.supabase.service-role-key=${BFA_SUPABASE_SERVICE_ROLE_KEY:}
bfa.storage.supabase.bucket=${BFA_SUPABASE_STORAGE_BUCKET:bfa-item-images}
bfa.storage.supabase.create-bucket=${BFA_SUPABASE_CREATE_BUCKET:true}
