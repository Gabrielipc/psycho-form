security.jwt.secret=${BFA_JWT_SECRET:test-secret-for-psychoform-jwt-1234567890}
spring.datasource.url=${BFA_DB_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
spring.datasource.username=${BFA_DB_USERNAME:postgres}
spring.datasource.password=${BFA_DB_PASSWORD:postgres}
storage.s3.endpoint=${BFA_STORAGE_S3_ENDPOINT:http://127.0.0.1:54321/storage/v1/s3}
storage.s3.region=${BFA_STORAGE_S3_REGION:local}
storage.s3.bucket=${BFA_STORAGE_S3_BUCKET:images}
storage.s3.access-key=${BFA_STORAGE_S3_ACCESS_KEY:}
storage.s3.secret-key=${BFA_STORAGE_S3_SECRET_KEY:}
storage.s3.path-style=${BFA_STORAGE_S3_PATH_STYLE:true}
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
